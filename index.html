<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffd9e8">
  <title>DSPM - เริ่มต้นการประเมิน</title>

  <!-- โหลดฟอนต์ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
   body {
   font-family: 'Sarabun', sans-serif;
      margin: 0;
      padding: 0;
      font-family: 'Itim', cursive;
      background: linear-gradient(180deg, #ffe8f0, #fef7d5, #e0f7fa);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      position: relative;
      overflow: hidden;
   }

    /* พื้นหลังการ์ตูนเด็กทารก */
    .baby-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 450px;
      opacity: 0.15;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    h1 {
    font-family: 'Sarabun', sans-serif;
    font-size: 3rem;
    font-weight: 700;
    color: #c2185b;
    letter-spacing: 1px;
    margin-bottom: 10px;
}

h2 {
    font-family: 'Sarabun', sans-serif;
    font-size: 2rem;
    font-weight: 600;
    color: #d81b60;
}

p {
    font-size: 1.1rem;
    color: #555;
    line-height: 1.8;
}

    .btn-start {
      background-color: #ffb6c1;
      color: white;
      padding: 15px 40px;
      font-size: 1.2em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      display: inline-block;
      animation: bounce 1.5s infinite;
      z-index: 1;
      position: relative;
    }

    .btn-start:hover {
      background-color: #ff8fab;
      transform: scale(1.05);
    }

    /* แอนิเมชันเด้ง */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2em; }
      p { font-size: 1em; }
      .btn-start { padding: 12px 28px; font-size: 1em; }
      .baby-bg { width: 300px; }
      .decor { width: 50px; }
    }
  </style>
</head>
<body>

  <h1>แบบประเมินพัฒนาการเด็ก DSPM</h1>
<h2>Developmental Surveillance and Promotion Manual</h2>
<p>
ระบบประเมินพัฒนาการเด็กแรกเกิด – 5 ปี<br>
อ้างอิงตามแนวทางของกรมอนามัย กระทรวงสาธารณสุข
</p>

  <a href="select-age.html" class="btn-start">เริ่มต้นการประเมิน</a>

</body>
</html>
